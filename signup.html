<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign-up | Richfield Connect</title>
  <link rel="stylesheet" href="CSS/signup.css">
</head>
<body>
  <div class="signup-container">
    <h2>Sign Up</h2>
    <form id="signupForm" novalidate>
      <div class="form-group">
        <label for="studentNumber">Student Number</label>
        <input type="text" id="studentNumber" name="studentNumber" required>
        <div class="error-message" id="studentNumberError"></div>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
        <div class="error-message" id="emailError"></div>
      </div>
       <div class="form-group">
        <label for="campus">Campus</label>
        <input type="campus" id="campus" name="campus" required>
        <div class="error-message" id="campusError"></div>
      </div>
       <div class="form-group">
        <label for="interests">Any Interests?</label>
        <input type="interests" id="interests" name="interests" required>
        <div class="interest-message" id="interestError"></div>
      </div>
       <div class="form-group">
        <label for="bio">Please Provide a Bio for your Profile</label>
        <input type="bio" id="bio" name="bio" required>
        <div class="bio-message" id="bioError"></div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
        <div class="error-message" id="passwordError"></div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required>
        <div class="error-message" id="confirmPasswordError"></div>
      </div>
      <button type="submit">Register</button>
    </form>
    <div id="successMessage" class="success-message"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
